abstract: 'We present and share a large database containing electroencephalographic signals from 87 human participants, collected
  during a single day of brain-computer interface (BCI) experiments, organized into 3 datasets (A, B, and C) that were all
  recorded using the same protocol: right and left hand motor imagery (MI). Each session contains 240 trials (120 per class),
  which represents more than 20,800 trials, or approximately 70 hours of recording time. It includes the performance of the
  associated BCI users, detailed information about the demographics, personality profile as well as some cognitive traits
  and the experimental instructions and codes (executed in the open-source platform OpenViBE). Such database could prove useful
  for various studies, including but not limited to: (1) studying the relationships between BCI users'' profiles and their
  BCI performances, (2) studying how EEG signals properties varies for different users'' profiles and MI tasks, (3) using
  the large number of participants to design cross-user BCI machine learning algorithms or (4) incorporating users'' profile
  information into the design of EEG signal classification algorithms.'
